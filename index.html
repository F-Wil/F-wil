<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Custom Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" 
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html, body { height: 100%; margin: 0; }
        #map { width: 100%; height: 85%; }
        #filter-controls {
            width: 100%;
            height: 15%;
            background-color: #f0f0f0;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #ccc;
        }
        button {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .filter-label {
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="filter-controls">
    <span class="filter-label">Filters:</span>
    <button onclick="filterByProperty('Wendeschleife', true)">Show Turnaround Loops</button>
    <button onclick="filterByProperty('Betriebshof', true)">Show Depots</button>
    <button onclick="resetFilter()">Show All</button>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Your own JavaScript -->
<script src="script.js"></script>

</body>
</html>
