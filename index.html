<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Custom Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" 
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html, body { height: 100%; margin: 0; }
        #map { width: 100%; height: 85%; }
        #filter-controls {
            width: 100%;
            height: 15%;
            background-color: #f0f0f0;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            border-top: 1px solid #ccc;
        }
        .filter-label {
            font-weight: bold;
            margin-right: 15px;
            font-size: 16px;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .color-indicator {
            width: 16px;
            height: 16px;
            border-radius: 2px;
            border: 1px solid #333;
        }
        .filter-item input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        .filter-item label {
            cursor: pointer;
            font-size: 14px;
            margin: 0;
        }
        button {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="filter-controls">
    <span class="filter-label">Filters:</span>
    
    <div class="filter-item">
        <span class="color-indicator" style="background-color: #FF0000;"></span>
        <input type="checkbox" id="betriebshof-checkbox" onchange="toggleFilter('Betriebshof', this.checked)">
        <label for="betriebshof-checkbox">Betriebshof (Depots)</label>
    </div>
    
    <div class="filter-item">
        <span class="color-indicator" style="background-color: #0000FF;"></span>
        <input type="checkbox" id="wendeschleife-checkbox" onchange="toggleFilter('Wendeschleife', this.checked)">
        <label for="wendeschleife-checkbox">Wendeschleife (Turnarounds)</label>
    </div>
    
    <button onclick="resetAllFilters()">Show All</button>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Your own JavaScript -->
<script src="script.js"></script>
<footer>
    <a href="impressum.html">Impressum</a> | 
    <a href="https://github.com/F-Wil/F-wil">GitHub Repository</a>
</footer>
</body>
</html>
