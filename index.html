<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title> TramTracks: (Historisches) Straßenbahnnetz Hamburg </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <!-- Unbounded Schriftart -->
<link href="https://fonts.googleapis.com/css2?family=Aleo:wght@400;700&family=Funnel+Display:wght@400;700&family=Funnel+Sans:wght@400;700&family=Inter:wght@400;700&family=Poppins:wght@400;700&family=Raleway:wght@400;700&family=Suse:wght@400;700&family=Unbounded:wght@200..900&display=swap" rel="stylesheet">

<!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <!-- Leaflet Control Geocoder CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Karte immer ganz hinten -->
<div id="map">
  <div id="map-tint"></div>
</div>

<!-- Logo oben mitte -->
<div id="logo">
    <h1>Straßenbahn Hamburg</h1>
    <h2>Gleisfreie und Hansestadt Hamburg</h2>
</div>

<!-- Pill-shaped Timeline -->
<div id="timeline-container">
  <div id="year-display">1900</div>
  <div id="timeline-wrapper">

    <div class="timeline-label left">1866</div>

    <div class="timeline-center">
      <button id="prev-year" class="year-arrow">&larr;</button>
      <input 
        type="range"
        id="timeline"
        min="1866"
        max="2065"
        value="1900"
        step="1">
      <button id="next-year" class="year-arrow">&rarr;</button>
    </div>

    <div class="timeline-label right">2065</div>

  </div>
</div>

<!-- Legend -->
<div id="legend-container">
  <button id="legend-toggle">Legende</button>
  <div id="legend-content">
    <h4>Straßenbahn-Legende</h4>
    <div class="legend-item">
      <svg width="50" height="10">
        <line x1="0" y1="5" x2="50" y2="5" stroke="var(--tram-color)" stroke-width="var(--line-weight)" stroke-dasharray="var(--line-dasharray-pferdebahn)" />
      </svg>
      <span>Pferdebahn (gestrichelt)</span>
    </div>
    <div class="legend-item">
      <svg width="50" height="10">
        <line x1="0" y1="5" x2="50" y2="5" stroke="var(--tram-color)" stroke-width="var(--line-weight)" stroke-dasharray="var(--line-dasharray)" />
      </svg>
      <span>Straßenbahn, elektrisch (durchgezogen)</span>
    </div>
    <div class="legend-item">
      <svg width="50" height="10">
        <line x1="0" y1="5" x2="50" y2="5" stroke="var(--nftram-color)" stroke-width="var(--line-weight)" stroke-dasharray="var(--line-dasharray)" />
      </svg>
      <span>Niederflur-Straßenbahn</span>
    </div>
    <div class="legend-item">
      <svg width="20" height="20">
        <circle cx="10" cy="10" r="8" fill="var(--wendeschleife-color)" stroke="var(--wendeschleife-color)" stroke-width="1" fill-opacity="0.8" />
      </svg>
      <span>Wendeschleife</span>
    </div>
    <div class="legend-item">
      <svg width="20" height="20">
        <circle cx="10" cy="10" r="10" fill="var(--betriebshof-color)" stroke="var(--betriebshof-color)" stroke-width="4" fill-opacity="0.8" />
      </svg>
      <span>Betriebshof</span>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Leaflet Control Geocoder JS -->
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="js/main.js"></script>

</body>
</html>
