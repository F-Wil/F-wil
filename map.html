<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F-Wil Map - Hamburg Transit Infrastructure</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" 
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        nav { background-color: #007bff; padding: 1rem; }
        nav a { color: white; text-decoration: none; font-weight: 500; }
        nav a:hover { text-decoration: underline; }
        #map { width: 100%; height: calc(100vh - 180px); }
        #filter-controls {
            width: 100%;
            height: auto;
            background-color: #f0f0f0;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            border-top: 1px solid #ccc;
        }
        .filter-label {
            font-weight: bold;
            margin-right: 15px;
            font-size: 16px;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .color-indicator {
            width: 16px;
            height: 16px;
            border-radius: 2px;
            border: 1px solid #333;
        }
        .filter-item input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        .filter-item label {
            cursor: pointer;
            font-size: 14px;
            margin: 0;
        }
        button {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #0056b3;
        }
        footer {
            background-color: #f0f0f0;
            padding: 1rem;
            text-align: center;
            border-top: 1px solid #ccc;
        }
        footer a { color: #007bff; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">← Back to Home</a>
</nav>

<div id="map"></div>

<div id="filter-controls">
    <span class="filter-label">Filters:</span>
    
    <div class="filter-item">
        <span class="color-indicator" style="background-color: #FF0000;"></span>
        <input type="checkbox" id="betriebshof-checkbox" onchange="toggleFilter('Betriebshof', this.checked)">
        <label for="betriebshof-checkbox">Betriebshof (Depots)</label>
    </div>
    
    <div class="filter-item">
        <span class="color-indicator" style="background-color: #0000FF;"></span>
        <input type="checkbox" id="wendeschleife-checkbox" onchange="toggleFilter('Wendeschleife', this.checked)">
        <label for="wendeschleife-checkbox">Wendeschleife (Turnarounds)</label>
    </div>
    
    <button onclick="resetAllFilters()">Show All</button>
</div>

<footer>
    <a href="impressum.html">Impressum</a> | 
    <a href="https://github.com/F-Wil/F-wil">GitHub Repository</a>
</footer>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Your own JavaScript -->
<script src="script.js"></script>

</body>
</html>
